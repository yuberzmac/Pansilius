<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard API | Enregble</title>
    <!-- SweetAlert2 para alertas llamativas -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --danger: #ef4444;
            --success: #10b981;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            background: linear-gradient(135deg, var(--primary), #8b5cf6);
            color: white;
            padding: 1.5rem 2rem;
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.2);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        main {
            flex: 1;
            padding: 2rem;
            max-width: 1100px;
            margin: 0 auto;
            width: 100%;
        }

        .container {
            background-color: var(--card-bg);
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            padding: 2.5rem;
            margin-bottom: 2rem;
            border: 1px solid var(--border);
        }

        h1, h2 {
            font-weight: 700;
            letter-spacing: -0.025em;
            margin-bottom: 1.5rem;
        }

        .form-group {
            margin-bottom: 1.25rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            font-size: 0.875rem;
            color: var(--text-main);
        }

        input, select {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 1px solid var(--border);
            border-radius: 8px;
            outline: none;
            transition: all 0.2s;
            font-size: 1rem;
        }

        input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
        }

        button {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        button:hover {
            background-color: var(--primary-hover);
            transform: translateY(-1px);
        }

        button.secondary {
            background-color: #f1f5f9;
            color: #475569;
        }

        button.secondary:hover {
            background-color: #e2e8f0;
        }

        button.danger {
            background-color: #fee2e2;
            color: #ef4444;
        }

        button.danger:hover {
            background-color: #fecaca;
        }

        table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            margin-top: 1.5rem;
        }

        th, td {
            text-align: left;
            padding: 1.25rem;
            border-bottom: 1px solid var(--border);
        }

        th {
            background-color: #f8fafc;
            color: var(--text-muted);
            font-size: 0.75rem;
            text-transform: uppercase;
            font-weight: 700;
            letter-spacing: 0.05em;
        }

        tr:last-child td { border-bottom: none; }

        .badge {
            padding: 0.375rem 0.75rem;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: 700;
            display: inline-flex;
            align-items: center;
            gap: 0.375rem;
        }

        .badge::before {
            content: '';
            width: 6px;
            height: 6px;
            border-radius: 50%;
        }

        .badge.active { background-color: #dcfce7; color: #15803d; }
        .badge.active::before { background-color: #22c55e; }

        .badge.inactive { background-color: #fee2e2; color: #b91c1c; }
        .badge.inactive::before { background-color: #ef4444; }

        .hidden { display: none; }

        .flex-row {
            display: flex;
            gap: 1.5rem;
            align-items: flex-end;
            flex-wrap: wrap;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }

        .user-pill {
            background-color: rgba(255, 255, 255, 0.2);
            padding: 0.5rem 1rem;
            border-radius: 9999px;
            font-size: 0.875rem;
            font-weight: 500;
            backdrop-filter: blur(4px);
        }

        /* Animaciones */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .animate-fade {
            animation: fadeIn 0.4s ease-out forwards;
        }
    </style>
</head>
<body>

    <header>
        <div style="display: flex; align-items: center; gap: 0.75rem;">
            <div style="background: white; width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center;">
                <span style="color: var(--primary); font-weight: 900;">P</span>
            </div>
            <h2 style="font-size: 1.25rem; margin-bottom: 0;">Pansilius API</h2>
        </div>
        <div id="user-info" class="hidden">
            <span id="username-display" class="user-pill" style="margin-right: 1rem;"></span>
            <button onclick="logout()" class="secondary" style="padding: 0.5rem 1rem; font-size: 0.875rem;">Cerrar Sesión</button>
        </div>
    </header>

    <main>
        <!-- Sección de Autenticación -->
        <div id="auth-section" class="container animate-fade">
            <h2>Bienvenido</h2>
            <p style="margin-bottom: 2rem; color: var(--text-muted);">Gestiona tus productos de forma segura con nuestra API REST.</p>
            
            <div class="form-group">
                <label>Usuario</label>
                <input type="text" id="auth-user" placeholder="Ingresa tu usuario">
            </div>
            <div class="form-group">
                <label>Contraseña</label>
                <input type="password" id="auth-pass" placeholder="••••••••">
            </div>
            
            <div style="margin-top: 1.5rem; display: flex; gap: 1rem;">
                <button onclick="login()" style="flex: 1;">Iniciar Sesión</button>
                <button onclick="register()" class="secondary" style="flex: 1;">Registrarse</button>
            </div>
        </div>

        <!-- Sección del CRUD -->
        <div id="crud-section" class="container hidden animate-fade">
            <div class="card-header">
                <h2 style="margin-bottom: 0;">Gestión de Productos</h2>
                <button onclick="loadItems()" class="secondary">
                    <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                    Refrescar
                </button>
            </div>
            
            <div style="background-color: #f1f5f9; padding: 2rem; border-radius: 12px; margin-bottom: 2.5rem; border: 1px dashed #cbd5e1;">
                <h3 style="margin-bottom: 1.25rem; font-size: 1rem; font-weight: 700;">Añadir nuevo registro</h3>
                <div class="flex-row">
                    <div style="flex: 1; min-width: 200px;">
                        <label>Nombre del Item</label>
                        <input type="text" id="item-nombre" placeholder="Ej. Monitor 4K">
                    </div>
                    <div style="flex: 2; min-width: 300px;">
                        <label>Descripción</label>
                        <input type="text" id="item-desc" placeholder="Especificaciones, marca...">
                    </div>
                    <div style="width: 140px;">
                        <label>Estado</label>
                        <select id="item-estado">
                            <option value="true">Activo</option>
                            <option value="false">Inactivo</option>
                        </select>
                    </div>
                    <button onclick="createItem()">
                        <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6"></path></svg>
                        Guardar
                    </button>
                </div>
            </div>

            <div style="overflow-x: auto;">
                <table id="items-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Producto</th>
                            <th>Descripción</th>
                            <th>Estado</th>
                            <th style="text-align: right;">Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="items-body">
                        <!-- Items cargados por JS -->
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <script>
        let token = localStorage.getItem('token');
        const API_URL = window.location.origin;

        // --- ALERTAS LLAMATIVAS (SweetAlert2) ---
        function toast(msg, icon = 'success') {
            const Toast = Swal.mixin({
                toast: true,
                position: 'top-end',
                showConfirmButton: false,
                timer: 3000,
                timerProgressBar: true
            });
            Toast.fire({ icon, title: msg });
        }

        function checkAuth() {
            if (token) {
                document.getElementById('auth-section').classList.add('hidden');
                document.getElementById('crud-section').classList.remove('hidden');
                document.getElementById('user-info').classList.remove('hidden');
                loadItems();
            } else {
                document.getElementById('auth-section').classList.remove('hidden');
                document.getElementById('crud-section').classList.add('hidden');
                document.getElementById('user-info').classList.add('hidden');
            }
        }

        // --- AUTH ---
        async function login() {
            const username = document.getElementById('auth-user').value;
            const password = document.getElementById('auth-pass').value;

            try {
                const res = await fetch(`${API_URL}/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await res.json();
                
                if (res.ok) {
                    token = data.token;
                    localStorage.setItem('token', token);
                    document.getElementById('username-display').textContent = username;
                    Swal.fire({
                        title: '¡Bienvenido!',
                        text: 'Inicio de sesión correcto',
                        icon: 'success',
                        confirmButtonColor: '#6366f1'
                    });
                    checkAuth();
                } else {
                    Swal.fire('Error', data.message, 'error');
                }
            } catch (error) {
                Swal.fire('Error', 'No se pudo conectar con el servidor', 'error');
            }
        }

        async function register() {
            const username = document.getElementById('auth-user').value;
            const password = document.getElementById('auth-pass').value;

            if (!username || !password) return toast('Completa los campos', 'warning');

            try {
                const res = await fetch(`${API_URL}/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await res.json();
                
                if (res.ok) {
                    Swal.fire('¡Registrado!', 'Ahora puedes iniciar sesión con tu cuenta.', 'success');
                } else {
                    Swal.fire('Aviso', data.message, 'info');
                }
            } catch (error) {
                Swal.fire('Error', 'Error de conexión', 'error');
            }
        }

        function logout() {
            token = null;
            localStorage.removeItem('token');
            checkAuth();
            toast('Sesión cerrada', 'info');
        }

        // --- CRUD ---
        async function loadItems() {
            try {
                const res = await fetch(`${API_URL}/api/items`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                
                if (res.status === 401 || res.status === 403) return logout();

                const items = await res.json();
                const tbody = document.getElementById('items-body');
                tbody.innerHTML = '';

                items.forEach(item => {
                    const tr = document.createElement('tr');
                    const isActivo = item.estado === 1 || item.estado === true;
                    tr.innerHTML = `
                        <td style="color: var(--text-muted); font-size: 0.875rem;">#${item.id}</td>
                        <td style="font-weight: 600;">${item.nombre}</td>
                        <td style="color: var(--text-muted);">${item.descripcion || '-'}</td>
                        <td><span class="badge ${isActivo ? 'active' : 'inactive'}">${isActivo ? 'Activo' : 'Inactivo'}</span></td>
                        <td style="text-align: right;">
                            <button onclick="deleteItem(${item.id})" class="danger" style="padding: 0.5rem;">
                                <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                            </button>
                        </td>
                    `;
                    tbody.appendChild(tr);
                });
            } catch (error) {
                toast('Error al cargar datos', 'error');
            }
        }

        async function createItem() {
            const nombre = document.getElementById('item-nombre').value;
            const descripcion = document.getElementById('item-desc').value;
            const estado = document.getElementById('item-estado').value === 'true';

            if (!nombre) return toast('El nombre es obligatorio', 'warning');

            try {
                const res = await fetch(`${API_URL}/api/items`, {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ nombre, descripcion, estado })
                });

                if (res.ok) {
                    toast('Producto guardado');
                    document.getElementById('item-nombre').value = '';
                    document.getElementById('item-desc').value = '';
                    loadItems();
                }
            } catch (error) {
                toast('Error al guardar', 'error');
            }
        }

        async function deleteItem(id) {
            const result = await Swal.fire({
                title: '¿Estás seguro?',
                text: "Esta acción no se puede deshacer",
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#ef4444',
                cancelButtonColor: '#64748b',
                confirmButtonText: 'Sí, eliminar',
                cancelButtonText: 'Cancelar'
            });

            if (result.isConfirmed) {
                try {
                    const res = await fetch(`${API_URL}/api/items/${id}`, {
                        method: 'DELETE',
                        headers: { 'Authorization': `Bearer ${token}` }
                    });
                    if (res.ok) {
                        toast('Eliminado correctamente', 'success');
                        loadItems();
                    }
                } catch (error) {
                    toast('Error al eliminar', 'error');
                }
            }
        }

        checkAuth();
    </script>
</body>
</html>
