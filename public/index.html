<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard API | Enregble</title>
    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --danger: #ef4444;
            --success: #10b981;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }

        body { background-color: var(--bg-color); color: var(--text-main); min-height: 100vh; display: flex; flex-direction: column; }

        header { background: linear-gradient(135deg, var(--primary), #8b5cf6); color: white; padding: 1.5rem 2rem; box-shadow: 0 4px 12px rgba(99, 102, 241, 0.2); display: flex; justify-content: space-between; align-items: center; }

        main { flex: 1; padding: 2rem; max-width: 1100px; margin: 0 auto; width: 100%; }

        .container { background-color: var(--card-bg); border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); padding: 2.5rem; margin-bottom: 2rem; border: 1px solid var(--border); }

        h2 { font-weight: 700; letter-spacing: -0.025em; margin-bottom: 1.5rem; }

        .form-group { margin-bottom: 1.25rem; }

        label { display: block; margin-bottom: 0.5rem; font-weight: 600; font-size: 0.875rem; color: var(--text-main); }

        input, select { width: 100%; padding: 0.75rem 1rem; border: 1px solid var(--border); border-radius: 8px; outline: none; transition: all 0.2s; font-size: 1rem; }

        input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2); }

        button { background-color: var(--primary); color: white; border: none; padding: 0.75rem 1.5rem; border-radius: 8px; cursor: pointer; font-weight: 600; transition: all 0.2s; display: inline-flex; align-items: center; justify-content: center; gap: 0.5rem; }

        button:hover { background-color: var(--primary-hover); transform: translateY(-1px); }

        button.secondary { background-color: #f1f5f9; color: #475569; }

        button.danger { background-color: #fee2e2; color: #ef4444; }

        table { width: 100%; border-collapse: separate; border-spacing: 0; margin-top: 1.5rem; }

        th, td { text-align: left; padding: 1.25rem; border-bottom: 1px solid var(--border); }

        th { background-color: #f8fafc; color: var(--text-muted); font-size: 0.75rem; text-transform: uppercase; font-weight: 700; }

        .badge { padding: 0.375rem 0.75rem; border-radius: 6px; font-size: 0.75rem; font-weight: 700; display: inline-flex; align-items: center; gap: 0.375rem; }
        .badge.active { background-color: #dcfce7; color: #15803d; }
        .badge.inactive { background-color: #fee2e2; color: #b91c1c; }

        .hidden { display: none; }

        .flex-row { display: flex; gap: 1.5rem; align-items: flex-end; flex-wrap: wrap; }

        .animate-fade { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Estilo para el switch de Login/Registro */
        .tabs { display: flex; gap: 1rem; margin-bottom: 2rem; border-bottom: 2px solid var(--border); }
        .tab { padding: 0.75rem 1rem; cursor: pointer; font-weight: 600; color: var(--text-muted); border-bottom: 2px solid transparent; margin-bottom: -2px; }
        .tab.active { color: var(--primary); border-bottom-color: var(--primary); }
    </style>
</head>
<body>

    <header>
        <div style="display: flex; align-items: center; gap: 0.75rem;">
            <div style="background: white; width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center;">
                <span style="color: var(--primary); font-weight: 900;">P</span>
            </div>
            <h2 style="font-size: 1.25rem; margin-bottom: 0;">Pansilius API</h2>
        </div>
        <div id="user-info" class="hidden">
            <span id="username-display" style="background: rgba(255,255,255,0.2); padding: 0.5rem 1rem; border-radius: 999px; margin-right: 1rem;"></span>
            <button onclick="logout()" class="secondary" style="padding: 0.5rem 1rem; font-size: 0.875rem;">Cerrar Sesión</button>
        </div>
    </header>

    <main>
        <!-- Sección de Autenticación -->
        <div id="auth-section" class="container animate-fade">
            <div class="tabs">
                <div id="tab-login" class="tab active" onclick="switchAuth(true)">Iniciar Sesión</div>
                <div id="tab-register" class="tab" onclick="switchAuth(false)">Crear Cuenta</div>
            </div>

            <div id="login-form">
                <div class="form-group">
                    <label>Usuario</label>
                    <input type="text" id="login-user" placeholder="Tu usuario">
                </div>
                <div class="form-group">
                    <label>Contraseña</label>
                    <input type="password" id="login-pass" placeholder="••••••••">
                </div>
                <button onclick="login()" style="width: 100%; margin-top: 1rem;">Entrar al Panel</button>
            </div>

            <div id="register-form" class="hidden">
                <div class="flex-row" style="align-items: flex-start;">
                    <div style="flex: 1;">
                        <div class="form-group">
                            <label>Usuario *</label>
                            <input type="text" id="reg-user" placeholder="Ej. yuberz">
                        </div>
                        <div class="form-group">
                            <label>Contraseña *</label>
                            <input type="password" id="reg-pass" placeholder="Mínimo 6 caracteres">
                        </div>
                    </div>
                    <div style="flex: 1;">
                        <div class="form-group">
                            <label>Nombre Completo</label>
                            <input type="text" id="reg-nombre" placeholder="Nombre y Apellido">
                        </div>
                        <div class="form-group">
                            <label>Teléfono</label>
                            <input type="text" id="reg-tel" placeholder="+51 ...">
                        </div>
                    </div>
                </div>
                <div class="form-group">
                    <label>URL de Foto de Perfil (Opcional)</label>
                    <input type="text" id="reg-foto" placeholder="https://imagen.com/foto.jpg">
                </div>
                <button onclick="register()" style="width: 100%; margin-top: 1rem;">Completar Registro</button>
            </div>
        </div>

        <!-- Sección del CRUD -->
        <div id="crud-section" class="container hidden animate-fade">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
                <h2>Gestión de Productos</h2>
                <button onclick="loadItems()" class="secondary">Actualizar</button>
            </div>
            
            <div style="background-color: #f1f5f9; padding: 2rem; border-radius: 12px; margin-bottom: 2.5rem;">
                <h3 style="margin-bottom: 1.25rem; font-size: 1rem;">Nuevo Registro</h3>
                <div class="flex-row">
                    <div style="flex: 1;"><label>Nombre</label><input type="text" id="item-nombre"></div>
                    <div style="flex: 2;"><label>Descripción</label><input type="text" id="item-desc"></div>
                    <div style="width: 140px;"><label>Estado</label><select id="item-estado"><option value="true">Activo</option><option value="false">Inactivo</option></select></div>
                    <button onclick="createItem()">Guardar</button>
                </div>
            </div>

            <table id="items-table">
                <thead><tr><th>ID</th><th>Producto</th><th>Descripción</th><th>Estado</th><th style="text-align: right;">Acciones</th></tr></thead>
                <tbody id="items-body"></tbody>
            </table>
        </div>
    </main>

    <script>
        let token = localStorage.getItem('token');
        const API_URL = window.location.origin;

        function toast(msg, icon = 'success') {
            Swal.mixin({ toast: true, position: 'top-end', showConfirmButton: false, timer: 3000, timerProgressBar: true }).fire({ icon, title: msg });
        }

        function switchAuth(isLogin) {
            document.getElementById('login-form').classList.toggle('hidden', !isLogin);
            document.getElementById('register-form').classList.toggle('hidden', isLogin);
            document.getElementById('tab-login').classList.toggle('active', isLogin);
            document.getElementById('tab-register').classList.toggle('active', !isLogin);
        }

        function checkAuth() {
            if (token) {
                document.getElementById('auth-section').classList.add('hidden');
                document.getElementById('crud-section').classList.remove('hidden');
                document.getElementById('user-info').classList.remove('hidden');
                loadItems();
            } else {
                document.getElementById('auth-section').classList.remove('hidden');
                document.getElementById('crud-section').classList.add('hidden');
                document.getElementById('user-info').classList.add('hidden');
            }
        }

        async function login() {
            const username = document.getElementById('login-user').value;
            const password = document.getElementById('login-pass').value;
            try {
                const res = await fetch(`${API_URL}/login`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ username, password }) });
                const data = await res.json();
                if (res.ok) {
                    token = data.token;
                    localStorage.setItem('token', token);
                    document.getElementById('username-display').textContent = username;
                    Swal.fire('¡Bienvenido!', 'Sesión iniciada', 'success');
                    checkAuth();
                } else { Swal.fire('Error', data.message, 'error'); }
            } catch (e) { Swal.fire('Error', 'Conexión fallida', 'error'); }
        }

        async function register() {
            const username = document.getElementById('reg-user').value;
            const password = document.getElementById('reg-pass').value;
            const nombre = document.getElementById('reg-nombre').value;
            const telefono = document.getElementById('reg-tel').value;
            const foto = document.getElementById('reg-foto').value;

            if (!username || !password) return toast('Usuario y clave obligatorios', 'warning');

            try {
                const res = await fetch(`${API_URL}/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password, nombre, telefono, foto })
                });
                const data = await res.json();
                if (res.ok) {
                    Swal.fire('¡Éxito!', 'Cuenta creada. Ya puedes iniciar sesión.', 'success');
                    switchAuth(true);
                } else { Swal.fire('Error', data.message, 'error'); }
            } catch (e) { Swal.fire('Error', 'Conexión fallida', 'error'); }
        }

        function logout() { token = null; localStorage.removeItem('token'); checkAuth(); toast('Sesión cerrada', 'info'); }

        async function loadItems() {
            try {
                const res = await fetch(`${API_URL}/api/items`, { headers: { 'Authorization': `Bearer ${token}` } });
                if (res.status > 400) return logout();
                const items = await res.json();
                const tbody = document.getElementById('items-body');
                tbody.innerHTML = items.map(item => `
                    <tr>
                        <td>#${item.id}</td>
                        <td style="font-weight:600">${item.nombre}</td>
                        <td style="color:var(--text-muted)">${item.descripcion || '-'}</td>
                        <td><span class="badge ${item.estado ? 'active' : 'inactive'}">${item.estado ? 'Activo' : 'Inactivo'}</span></td>
                        <td style="text-align:right"><button onclick="deleteItem(${item.id})" class="danger">Borrar</button></td>
                    </tr>
                `).join('');
            } catch (e) { toast('Error al cargar', 'error'); }
        }

        async function createItem() {
            const nombre = document.getElementById('item-nombre').value;
            const descripcion = document.getElementById('item-desc').value;
            const estado = document.getElementById('item-estado').value === 'true';
            if (!nombre) return toast('Nombre requerido', 'warning');
            try {
                const res = await fetch(`${API_URL}/api/items`, { method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` }, body: JSON.stringify({ nombre, descripcion, estado }) });
                if (res.ok) { toast('Guardado'); document.getElementById('item-nombre').value = ''; document.getElementById('item-desc').value = ''; loadItems(); }
            } catch (e) { toast('Error', 'error'); }
        }

        async function deleteItem(id) {
            const result = await Swal.fire({ title: '¿Eliminar?', icon: 'warning', showCancelButton: true, confirmButtonColor: '#ef4444' });
            if (result.isConfirmed) {
                try {
                    const res = await fetch(`${API_URL}/api/items/${id}`, { method: 'DELETE', headers: { 'Authorization': `Bearer ${token}` } });
                    if (res.ok) { toast('Eliminado'); loadItems(); }
                } catch (e) { toast('Error', 'error'); }
            }
        }

        checkAuth();
    </script>
</body>
</html>
