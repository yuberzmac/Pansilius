<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pansilius | Acceso Corporativo</title>
    <!-- Agregamos un parámetro de versión para forzar la actualización del CSS -->
    <link rel="stylesheet" href="index.css?v=1.2">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <!-- Tipografía Inter de Google Fonts para un look profesional -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

    <div class="glass-card">
        <div class="logo-box">P</div>
        <h2>Pansilius Pro</h2>
        <p id="auth-subtitle">Inicia sesión en la plataforma administrativa</p>

        <div class="tabs">
            <button id="tab-l" class="active" onclick="toggleAuth(true)">Ingresar</button>
            <button id="tab-r" onclick="toggleAuth(false)">Nueva Cuenta</button>
        </div>

        <!-- Formulario de Entrada -->
        <div id="login-form">
            <div class="form-group">
                <label>Nombre de usuario</label>
                <input type="text" id="l-user" placeholder="ej. admin">
            </div>
            <div class="form-group">
                <label>Contraseña</label>
                <input type="password" id="l-pass" placeholder="••••••••">
            </div>
            <button onclick="login()" class="btn-primary">Entrar ahora</button>
        </div>

        <!-- Formulario de Registro -->
        <div id="register-form" class="hidden">
            <div class="form-group">
                <label>Usuario *</label>
                <input type="text" id="r-user" placeholder="ej. yuberz">
            </div>
            <div class="form-group">
                <label>Nombre completo</label>
                <input type="text" id="r-name" placeholder="Tu nombre">
            </div>
            <div class="form-group">
                <label>Contraseña *</label>
                <input type="password" id="r-pass" placeholder="Mínimo 6 caracteres">
            </div>
            
            <div class="form-group">
                <label>Foto de perfil</label>
                <div id="drop-area" class="modern-dropzone">
                    <div id="pre-view" class="hidden"><img id="avatar-img" class="avatar-preview"></div>
                    <div id="drop-text"><small>📷 Toca para subir imagen</small></div>
                    <input type="file" id="r-foto" accept="image/*" class="hidden">
                </div>
            </div>
            
            <button onclick="register()" class="btn-primary">Crear cuenta corporativa</button>
        </div>
    </div>

    <script>
        // Redirigir si ya hay token
        if (localStorage.getItem('token')) window.location.href = '/menupanel.html';

        function toggleAuth(isLogin) {
            document.getElementById('login-form').classList.toggle('hidden', !isLogin);
            document.getElementById('register-form').classList.toggle('hidden', isLogin);
            document.getElementById('tab-l').classList.toggle('active', isLogin);
            document.getElementById('tab-r').classList.toggle('active', !isLogin);
            document.getElementById('auth-subtitle').textContent = isLogin 
                ? 'Inicia sesión en la plataforma administrativa' 
                : 'Crea una cuenta para gestionar el inventario';
        }

        const dropArea = document.getElementById('drop-area');
        const fileInp = document.getElementById('r-foto');
        dropArea.onclick = () => fileInp.click();
        fileInp.onchange = e => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = e => {
                    document.getElementById('avatar-img').src = e.target.result;
                    document.getElementById('pre-view').classList.remove('hidden');
                    document.getElementById('drop-text').classList.add('hidden');
                };
                reader.readAsDataURL(file);
            }
        };

        async function login() {
            const username = document.getElementById('l-user').value;
            const password = document.getElementById('l-pass').value;
            if(!username || !password) return Swal.fire('Error', 'Completa los campos', 'warning');

            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await res.json();
                if (res.ok) {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('username', username);
                    window.location.href = '/menupanel.html';
                } else {
                    Swal.fire('Atención', data.message, 'error');
                }
            } catch (e) {
                Swal.fire('Error de red', 'No se pudo conectar con el servidor', 'error');
            }
        }

        async function register() {
            const formData = new FormData();
            formData.append('username', document.getElementById('r-user').value);
            formData.append('password', document.getElementById('r-pass').value);
            formData.append('nombre', document.getElementById('r-name').value);
            if (fileInp.files[0]) formData.append('foto', fileInp.files[0]);

            try {
                const res = await fetch('/api/auth/register', { method: 'POST', body: formData });
                if (res.ok) {
                    Swal.fire('¡Éxito!', 'Cuenta creada correctamente. Ya puedes ingresar.', 'success');
                    toggleAuth(true);
                } else {
                    const d = await res.json();
                    Swal.fire('Error', d.message, 'error');
                }
            } catch (e) {
                Swal.fire('Error', 'Error al registrar', 'error');
            }
        }
    </script>
</body>
</html>
