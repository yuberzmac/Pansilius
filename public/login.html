<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pansilius Pro | Acceso Administrativo</title>
    <link rel="stylesheet" href="index.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

    <div class="glass-card">
        <div class="logo-box">P</div>
        <h2>Pansilius Pro</h2>
        <p id="auth-subtitle">Gestión inteligente de inventario</p>

        <div class="tabs">
            <button id="tab-l" class="active" onclick="toggleAuth(true)">Entrar</button>
            <button id="tab-r" onclick="toggleAuth(false)">Registrarse</button>
        </div>

        <!-- Login -->
        <div id="login-form">
            <div class="form-group">
                <label>Usuario</label>
                <input type="text" id="l-user" placeholder="Tu nombre de usuario">
            </div>
            <div class="form-group">
                <label>Contraseña</label>
                <input type="password" id="l-pass" placeholder="••••••••">
            </div>
            <button onclick="login()" class="btn-primary">Entrar al Panel</button>
        </div>

        <!-- Registro -->
        <div id="register-form" class="hidden">
            <div class="form-group">
                <label>Usuario *</label>
                <input type="text" id="r-user" placeholder="ej. yuberz">
            </div>
            <div class="form-group">
                <label>Contraseña *</label>
                <input type="password" id="r-pass" placeholder="Mínimo 6 caracteres">
            </div>
            <div class="form-group">
                <label>Nombre Completo</label>
                <input type="text" id="r-name" placeholder="Juan Pérez">
            </div>
            
            <label>Foto de Perfil</label>
            <div id="drop-area" class="modern-dropzone" style="margin-bottom: 2rem;">
                <div id="pre-view" class="hidden"><img id="avatar-img" class="avatar-preview"></div>
                <div id="drop-text">
                    <small>📸 Toca para subir foto</small>
                </div>
                <input type="file" id="r-foto" accept="image/*" class="hidden">
            </div>
            
            <button onclick="register()" class="btn-primary">Crear mi Cuenta</button>
        </div>
    </div>

    <script>
        if (localStorage.getItem('token')) window.location.href = '/menupanel.html';

        function toggleAuth(isLogin) {
            document.getElementById('login-form').classList.toggle('hidden', !isLogin);
            document.getElementById('register-form').classList.toggle('hidden', isLogin);
            document.getElementById('tab-l').classList.toggle('active', isLogin);
            document.getElementById('tab-r').classList.toggle('active', !isLogin);
            document.getElementById('auth-subtitle').textContent = isLogin ? 'Gestión inteligente de inventario' : 'Únete a nuestra plataforma';
        }

        const dropArea = document.getElementById('drop-area');
        const fileInp = document.getElementById('r-foto');
        dropArea.onclick = () => fileInp.click();
        fileInp.onchange = e => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = e => {
                    document.getElementById('avatar-img').src = e.target.result;
                    document.getElementById('pre-view').classList.remove('hidden');
                    document.getElementById('drop-text').classList.add('hidden');
                };
                reader.readAsDataURL(file);
            }
        };

        async function login() {
            const username = document.getElementById('l-user').value;
            const password = document.getElementById('l-pass').value;
            if(!username || !password) return Swal.fire('Atención', 'Completa todos los campos', 'warning');
            
            try {
                const res = await fetch('/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await res.json();
                if (res.ok) {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('username', username);
                    window.location.href = '/menupanel.html';
                } else { Swal.fire('Error', data.message, 'error'); }
            } catch (e) { Swal.fire('Error', 'Fallo de conexión', 'error'); }
        }

        async function register() {
            const formData = new FormData();
            formData.append('username', document.getElementById('r-user').value);
            formData.append('password', document.getElementById('r-pass').value);
            formData.append('nombre', document.getElementById('r-name').value);
            if (fileInp.files[0]) formData.append('foto', fileInp.files[0]);

            try {
                const res = await fetch('/register', { method: 'POST', body: formData });
                if (res.ok) {
                    Swal.fire('¡Éxito!', 'Cuenta creada correctamente.', 'success');
                    toggleAuth(true);
                } else {
                    const d = await res.json();
                    Swal.fire('Error', d.message, 'error');
                }
            } catch (e) { Swal.fire('Error', 'Error al registrar', 'error'); }
        }
    </script>
</body>
</html>
