<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pansilius | Panel de Administración</title>
    <link rel="stylesheet" href="menupanel.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <div class="wrapper">
        <aside class="sidebar">
            <div class="logo">
                <div class="logo-box" style="color: white; padding: 5px;">P</div>
                <h2 style="font-size: 1.25rem; color: white;">Pansilius</h2>
            </div>
            <div class="nav-item active">Dashboard</div>
            <div class="nav-item" onclick="Swal.fire('Reportes', 'Función en desarrollo', 'info')">Reportes</div>
            <div style="margin-top: auto;">
                <div class="nav-item" onclick="logout()" style="color: #f87171;">Cerrar Sesión</div>
            </div>
        </aside>

        <main class="main-content">
            <header class="top-bar">
                <div>
                    <h1 style="font-size: 1.75rem;">Dashboard de Control</h1>
                    <p style="color: var(--text-gray);">Gestiona tus productos y visualiza estadísticas.</p>
                </div>
                <div class="user-profile">
                    <span id="user-name" style="font-weight: 600;">Usuario</span>
                </div>
            </header>

            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-label">Total Productos</div>
                    <div id="stat-total" class="stat-val">0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Activos</div>
                    <div id="stat-active" class="stat-val" style="color: var(--success);">0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Inactivos</div>
                    <div id="stat-inactive" class="stat-val" style="color: var(--danger);">0</div>
                </div>
            </div>

            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
                <h2 style="margin: 0;">Mis Productos</h2>
                <button onclick="showModal(true)" class="btn-add">+ Añadir Producto</button>
            </div>

            <div id="product-container" class="product-grid">
                <!-- Se llena dinámicamente -->
            </div>
        </main>
    </div>

    <!-- Modal Formulario -->
    <div id="item-modal" class="modal">
        <div class="modal-content">
            <h2 id="modal-title">Nuevo Producto</h2>
            <div class="form-group">
                <label>Nombre</label>
                <input type="text" id="i-nombre" placeholder="Nombre del producto">
            </div>
            <div class="form-group">
                <label>Descripción</label>
                <input type="text" id="i-desc" placeholder="Breve descripción">
            </div>
            <div class="form-group">
                <label>Estado</label>
                <select id="i-estado">
                    <option value="true">Activo</option>
                    <option value="false">Inactivo</option>
                </select>
            </div>
            <div style="display: flex; gap: 1rem; margin-top: 2rem;">
                <button onclick="saveItem()" class="btn-add" style="flex: 2;">Guardar Producto</button>
                <button onclick="showModal(false)" class="secondary" style="flex: 1;">Cancelar</button>
            </div>
        </div>
    </div>

    <script>
        const token = localStorage.getItem('token');
        if (!token) window.location.href = '/index.html';

        function showModal(show) { document.getElementById('item-modal').style.display = show ? 'flex' : 'none'; }
        
        function logout() {
            localStorage.clear();
            window.location.href = '/index.html';
        }

        async function loadItems() {
            try {
                const res = await fetch('/api/items', { headers: { 'Authorization': `Bearer ${token}` } });
                if (!res.ok) return logout();
                const items = await res.json();
                
                document.getElementById('stat-total').textContent = items.length;
                document.getElementById('stat-active').textContent = items.filter(i => i.estado).length;
                document.getElementById('stat-inactive').textContent = items.filter(i => !i.estado).length;

                const container = document.getElementById('product-container');
                container.innerHTML = items.map(i => `
                    <div class="product-card">
                        <span class="badge ${i.estado ? 'badge-active' : 'badge-inactive'}" style="position: absolute; top: 1.5rem; right: 1.5rem;">
                            ${i.estado ? 'Activo' : 'Inactivo'}
                        </span>
                        <div style="font-weight: 700; font-size: 1.1rem; margin-bottom: 0.5rem;">${i.nombre}</div>
                        <div style="color: var(--text-gray); font-size: 0.875rem;">${i.descripcion || 'Sin descripción'}</div>
                        <div style="margin-top: 1.5rem;">
                            <button onclick="deleteItem(${i.id})" class="danger">Eliminar</button>
                        </div>
                    </div>
                `).join('');
            } catch (e) { console.error('Error al cargar items'); }
        }

        async function saveItem() {
            const nombre = document.getElementById('i-nombre').value;
            const descripcion = document.getElementById('i-desc').value;
            const estado = document.getElementById('i-estado').value === 'true';

            try {
                const res = await fetch('/api/items', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                    body: JSON.stringify({ nombre, descripcion, estado })
                });
                if (res.ok) {
                    showModal(false);
                    loadItems();
                    Swal.fire('Guardado', 'Producto añadido correctamente', 'success');
                }
            } catch (e) { Swal.fire('Error', 'Fallo al guardar', 'error'); }
        }

        async function deleteItem(id) {
            const r = await Swal.fire({ title: '¿Eliminar?', icon: 'warning', showCancelButton: true });
            if (r.isConfirmed) {
                await fetch(`/api/items/${id}`, { method: 'DELETE', headers: { 'Authorization': `Bearer ${token}` } });
                loadItems();
            }
        }

        document.getElementById('user-name').textContent = localStorage.getItem('username');
        loadItems();
    </script>
</body>
</html>
