<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pansilius | Panel de Administración</title>
    <link rel="stylesheet" href="menupanel.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <div class="wrapper">
        <aside class="sidebar">
            <div class="logo">
                <div class="logo-box" style="color: white; padding: 5px;">P</div>
                <h2 style="font-size: 1.25rem; color: white;">Pansilius</h2>
            </div>
            <div id="nav-dashboard" class="nav-item active" onclick="toggleView('dashboard')">Dashboard</div>
            <div id="nav-profile" class="nav-item" onclick="toggleView('profile')">Perfil</div>
            <div class="nav-item" onclick="Swal.fire('Reportes', 'Función en desarrollo', 'info')">Reportes</div>
            <div style="margin-top: auto;">
                <div class="nav-item" onclick="logout()" style="color: #f87171;">Cerrar Sesión</div>
            </div>
        </aside>

        <main class="main-content">
            <!-- Dashboard View -->
            <div id="view-dashboard">
                <header class="top-bar">
                    <div>
                        <h1 style="font-size: 1.75rem;">Dashboard de Control</h1>
                        <p style="color: var(--text-gray);">Gestiona tus productos y visualiza estadísticas.</p>
                    </div>
                    <div class="user-profile">
                        <img id="user-img-small" src="" alt="" class="user-avatar" style="display:none;">
                        <span id="user-name" style="font-weight: 600;">Usuario</span>
                    </div>
                </header>

                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-label">Total Productos</div>
                        <div id="stat-total" class="stat-val">0</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">Activos</div>
                        <div id="stat-active" class="stat-val" style="color: var(--success);">0</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">Inactivos</div>
                        <div id="stat-inactive" class="stat-val" style="color: var(--danger);">0</div>
                    </div>
                </div>

                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
                    <h2 style="margin: 0;">Mis Productos</h2>
                    <button onclick="showModal(true)" class="btn-add">+ Añadir Producto</button>
                </div>

                <div id="product-container" class="product-grid">
                    <!-- Se llena dinámicamente -->
                </div>
            </div>

            <!-- Profile View -->
            <div id="view-profile" class="hidden">
                <header class="top-bar">
                    <div>
                        <h1 style="font-size: 1.75rem;">Mi Perfil</h1>
                        <p style="color: var(--text-gray);">Actualiza tu información personal.</p>
                    </div>
                </header>

                <div class="stat-card" style="max-width: 600px; margin: 0 auto;">
                    <div style="text-align: center; margin-bottom: 2rem;">
                        <img id="profile-img-preview" src="" alt="Avatar" style="width: 120px; height: 120px; border-radius: 20px; object-fit: cover; margin-bottom: 1rem; border: 4px solid var(--primary);">
                        <h2 id="profile-username-title">Usuario</h2>
                    </div>

                    <form id="profile-form">
                        <div class="form-group">
                            <label style="font-weight: 700; font-size: 0.8rem; text-transform: uppercase; color: var(--text-muted); margin-bottom: 0.5rem; display: block;">Nombre Completo</label>
                            <input type="text" id="p-nombre" placeholder="Tu nombre">
                        </div>
                        <div class="form-group">
                            <label style="font-weight: 700; font-size: 0.8rem; text-transform: uppercase; color: var(--text-muted); margin-bottom: 0.5rem; display: block;">Teléfono</label>
                            <input type="text" id="p-telefono" placeholder="Tu teléfono">
                        </div>
                        <div class="form-group">
                            <label style="font-weight: 700; font-size: 0.8rem; text-transform: uppercase; color: var(--text-muted); margin-bottom: 0.5rem; display: block;">Nueva Contraseña (opcional)</label>
                            <input type="password" id="p-password" placeholder="Dejar en blanco para no cambiar">
                        </div>
                        <div class="form-group">
                            <label style="font-weight: 700; font-size: 0.8rem; text-transform: uppercase; color: var(--text-muted); margin-bottom: 0.5rem; display: block;">Foto de Perfil</label>
                            <input type="file" id="p-foto" accept="image/*">
                        </div>
                        <button type="button" onclick="updateProfile()" class="btn-add" style="width: 100%; margin-top: 1rem;">Actualizar Perfil</button>
                        
                        <div style="margin-top: 2rem; padding-top: 2rem; border-top: 1px solid var(--border);">
                            <p style="font-size: 0.8rem; color: var(--text-muted); margin-bottom: 1rem;">Seguridad avanzada</p>
                            <button type="button" onclick="checkToken()" class="secondary" style="width: 100%; padding: 0.75rem; background: #f1f5f9; border: none; border-radius: 14px; font-weight: 700; cursor: pointer;">Ver Token de Sesión</button>
                        </div>
                    </form>
                </div>
            </div>
        </main>
    </div>

    <!-- Modal Formulario Producto -->
    <div id="item-modal" class="modal">
        <div class="modal-content">
            <h2 id="modal-title">Nuevo Producto</h2>
            <div class="form-group">
                <label>Nombre</label>
                <input type="text" id="i-nombre" placeholder="Nombre del producto">
            </div>
            <div class="form-group">
                <label>Descripción</label>
                <input type="text" id="i-desc" placeholder="Breve descripción">
            </div>
            <div class="form-group">
                <label>Estado</label>
                <select id="i-estado">
                    <option value="true">Activo</option>
                    <option value="false">Inactivo</option>
                </select>
            </div>
            <div style="display: flex; gap: 1rem; margin-top: 2rem;">
                <button onclick="saveItem()" id="btn-save-item" class="btn-add" style="flex: 2;">Guardar Producto</button>
                <button onclick="showModal(false)" class="secondary" style="flex: 1; background: #f1f5f9; border: none; border-radius: 14px; font-weight: 700; cursor: pointer;">Cancelar</button>
            </div>
        </div>
    </div>

    <script>
        const token = localStorage.getItem('token');
        if (!token) window.location.href = '/index.html';

        let editingId = null;

        function toggleView(view) {
            document.getElementById('view-dashboard').classList.toggle('hidden', view !== 'dashboard');
            document.getElementById('view-profile').classList.toggle('hidden', view !== 'profile');
            document.getElementById('nav-dashboard').classList.toggle('active', view === 'dashboard');
            document.getElementById('nav-profile').classList.toggle('active', view === 'profile');
            if (view === 'profile') loadProfile();
        }

        function showModal(show, item = null) {
            editingId = item ? item.id : null;
            document.getElementById('modal-title').textContent = item ? 'Editar Producto' : 'Nuevo Producto';
            document.getElementById('btn-save-item').textContent = item ? 'Actualizar Producto' : 'Guardar Producto';
            
            document.getElementById('i-nombre').value = item ? item.nombre : '';
            document.getElementById('i-desc').value = item ? (item.descripcion || '') : '';
            document.getElementById('i-estado').value = item ? item.estado.toString() : 'true';
            
            document.getElementById('item-modal').style.display = show ? 'flex' : 'none';
        }
        
        function logout() {
            localStorage.clear();
            window.location.href = '/index.html';
        }

        async function loadItems() {
            try {
                const res = await fetch('/api/items', { headers: { 'Authorization': `Bearer ${token}` } });
                if (!res.ok) return logout();
                const items = await res.json();
                
                document.getElementById('stat-total').textContent = items.length;
                document.getElementById('stat-active').textContent = items.filter(i => i.estado).length;
                document.getElementById('stat-inactive').textContent = items.filter(i => !i.estado).length;

                const container = document.getElementById('product-container');
                container.innerHTML = items.map(i => `
                    <div class="product-card">
                        <span class="badge ${i.estado ? 'badge-active' : 'badge-inactive'}" style="position: absolute; top: 1.5rem; right: 1.5rem;">
                            ${i.estado ? 'Activo' : 'Inactivo'}
                        </span>
                        <div class="p-name">${i.nombre}</div>
                        <div class="p-desc">${i.descripcion || 'Sin descripción'}</div>
                        <div style="display: flex; gap: 0.5rem; margin-top: 1.5rem;">
                            <button onclick='showModal(true, ${JSON.stringify(i).replace(/'/g, "&apos;")})' class="btn-add" style="padding: 0.6rem 1rem; font-size: 0.85rem; flex: 1;">Editar</button>
                            <button onclick="deleteItem(${i.id})" class="danger" style="flex: 1;">Eliminar</button>
                        </div>
                    </div>
                `).join('');
            } catch (e) { console.error('Error al cargar items'); }
        }

        async function saveItem() {
            const nombre = document.getElementById('i-nombre').value;
            const descripcion = document.getElementById('i-desc').value;
            const estado = document.getElementById('i-estado').value === 'true';

            const method = editingId ? 'PUT' : 'POST';
            const url = editingId ? `/api/items/${editingId}` : '/api/items';

            try {
                const res = await fetch(url, {
                    method: method,
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                    body: JSON.stringify({ nombre, descripcion, estado })
                });
                if (res.ok) {
                    showModal(false);
                    loadItems();
                    Swal.fire('Éxito', editingId ? 'Producto actualizado' : 'Producto añadido', 'success');
                } else {
                    const data = await res.json();
                    Swal.fire('Error', data.message || 'Fallo al guardar', 'error');
                }
            } catch (e) { Swal.fire('Error', 'Fallo al guardar', 'error'); }
        }

        async function deleteItem(id) {
            const r = await Swal.fire({ 
                title: '¿Eliminar producto?', 
                text: "Esta acción no se puede deshacer",
                icon: 'warning', 
                showCancelButton: true,
                confirmButtonColor: '#ef4444',
                confirmButtonText: 'Sí, eliminar'
            });
            if (r.isConfirmed) {
                await fetch(`/api/items/${id}`, { method: 'DELETE', headers: { 'Authorization': `Bearer ${token}` } });
                loadItems();
                Swal.fire('Eliminado', 'El producto ha sido borrado', 'success');
            }
        }

        async function loadProfile() {
            console.log('Cargando perfil...');
            try {
                const res = await fetch('/api/auth/profile', { headers: { 'Authorization': `Bearer ${token}` } });
                console.log('Respuesta perfil:', res.status);
                if (!res.ok) return;
                const user = await res.json();
                console.log('Datos de usuario recibidos:', user);
                
                document.getElementById('p-nombre').value = user.nombre || '';
                document.getElementById('p-telefono').value = user.telefono || '';
                document.getElementById('profile-username-title').textContent = user.username;
                document.getElementById('user-name').textContent = user.nombre || user.username;
                
                if (user.foto) {
                    const imgUrl = user.foto.startsWith('http') ? user.foto : user.foto;
                    document.getElementById('profile-img-preview').src = imgUrl;
                    const smallImg = document.getElementById('user-img-small');
                    smallImg.src = imgUrl;
                    smallImg.style.display = 'block';
                } else {
                    document.getElementById('profile-img-preview').src = 'https://ui-avatars.com/api/?name=' + (user.nombre || user.username);
                }
            } catch (e) { console.error('Error al cargar perfil'); }
        }

        async function updateProfile() {
            const formData = new FormData();
            formData.append('nombre', document.getElementById('p-nombre').value);
            formData.append('telefono', document.getElementById('p-telefono').value);
            const pass = document.getElementById('p-password').value;
            if (pass) formData.append('password', pass);
            
            const fotoFile = document.getElementById('p-foto').files[0];
            if (fotoFile) formData.append('foto', fotoFile);

            try {
                const res = await fetch('/api/auth/profile', {
                    method: 'PUT',
                    headers: { 'Authorization': `Bearer ${token}` },
                    body: formData
                });
                if (res.ok) {
                    Swal.fire('Perfil Actualizado', 'Tus datos se han guardado correctamente', 'success');
                    loadProfile();
                    document.getElementById('p-password').value = '';
                } else {
                    Swal.fire('Error', 'No se pudo actualizar el perfil', 'error');
                }
            } catch (e) { Swal.fire('Error', 'Ocurrió un error inesperado', 'error'); }
        }

        async function checkToken() {
            const { value: password } = await Swal.fire({
                title: 'Seguridad',
                input: 'password',
                inputLabel: 'Confirma tu contraseña para ver el token',
                inputPlaceholder: 'Ingresa tu contraseña',
                showCancelButton: true
            });

            if (password) {
                try {
                    const res = await fetch('/api/auth/verify-password', {
                        method: 'POST',
                        headers: { 
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${token}`
                        },
                        body: JSON.stringify({ password })
                    });

                    if (res.ok) {
                        Swal.fire({
                            title: 'Tu Token de Sesión',
                            html: `<div style="word-break: break-all; background: #f8fafc; padding: 1rem; border-radius: 8px; font-family: monospace; font-size: 0.8rem;">${token}</div>`,
                            icon: 'info'
                        });
                    } else {
                        Swal.fire('Error', 'Contraseña incorrecta', 'error');
                    }
                } catch (e) {
                    Swal.fire('Error', 'No se pudo verificar', 'error');
                }
            }
        }

        // Initial load
        loadItems();
        loadProfile();
    </script>
</body>
</html>
