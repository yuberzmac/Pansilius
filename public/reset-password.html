<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pansilius | Nueva Contraseña</title>
    <link rel="stylesheet" href="index.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>
    <div class="glass-card">
        <div class="logo-box">P</div>
        <h2>Nueva Contraseña</h2>
        <p id="auth-subtitle">Ingresa tu nueva clave de acceso.</p>
        
        <form id="reset-form">
            <div class="form-group">
                <label>Nueva Contraseña</label>
                <input type="password" id="new-password" placeholder="••••••••" required>
            </div>
            <div class="form-group">
                <label>Confirmar Contraseña</label>
                <input type="password" id="confirm-password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn-primary">Actualizar Contraseña</button>
        </form>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');

        if (!token) {
            Swal.fire('Error', 'Token no encontrado', 'error').then(() => window.location.href = '/');
        }

        document.getElementById('reset-form').onsubmit = async (e) => {
            e.preventDefault();
            const newPassword = document.getElementById('new-password').value;
            const confirm = document.getElementById('confirm-password').value;

            if (newPassword !== confirm) {
                return Swal.fire('Error', 'Las contraseñas no coinciden', 'error');
            }

            try {
                const res = await fetch('/api/auth/reset-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token, newPassword })
                });
                const data = await res.json();

                if (res.ok) {
                    // Borrar cualquier sesión antigua para evitar entrar a una cuenta incorrecta
                    localStorage.clear();
                    
                    Swal.fire('¡Éxito!', 'Contraseña actualizada. Ahora debes iniciar sesión.', 'success').then(() => window.location.href = '/');
                } else {
                    Swal.fire('Error', data.message, 'error');
                }
            } catch (err) {
                Swal.fire('Error', 'Hubo un problema con el servidor', 'error');
            }
        };
    </script>
</body>
</html>
